name: Generate Snake Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Snake Game from Contribution Grid
        uses: Platane/snk@v3.5.0
        with:
          github_user_name: Meryemkhlifi
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#D4537E
            dist/snake.gif?color_snake=#D4537E&color_dots=#191724,#26233a,#c4a7e7,#eb6f92,#D4537E

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
